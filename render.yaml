services:
  - type: web
    name: mn-clean-car-api
    runtime: python
    plan: free
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn server:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: MONGO_URL
        sync: false
      - key: DB_NAME
        value: mn_clean_car
      - key: JWT_SECRET
        generateValue: true
      - key: ADMIN_PHONE
        value: "8717958646"
      - key: ADMIN_PASSWORD
        sync: false
      - key: CALLMEBOT_API_KEY
        sync: false
      - key: CALLMEBOT_PHONE
        sync: false
